name: Build/Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g. v0.1.0)
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    
    timeout-minutes: 30

    strategy:
      fail-fast: false # Don't cancel Windows if Mac fails, and vice versa
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install

      - name: Clean Output Directory
        run: npx rimraf dist

      - name: Build App
        run: pnpm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: dist/*
          retention-days: 7

      - name: Release to GitHub
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Gitee Releases
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          # Get tag name without 'refs/tags/' prefix
          TAG=${GITHUB_REF#refs/tags/}
          
          # Get Gitee release ID
          GITEE_API="https://gitee.com/api/v5"
          GITEE_OWNER="lin-gaofan"
          GITEE_REPO="eason-moment"
          
          echo "Getting release ID for tag: $TAG"
          RELEASE_RESPONSE=$(curl -s "$GITEE_API/repos/$GITEE_OWNER/$GITEE_REPO/releases/tags/$TAG?access_token=${{ secrets.GITEE_TOKEN }}")
          
          # Check if release exists
          if echo "$RELEASE_RESPONSE" | grep -q '"id"'; then
            RELEASE_ID=$(echo "$RELEASE_RESPONSE" | grep -o '"id":[0-9]*' | head -1 | cut -d':' -f2)
            echo "Found Gitee release with ID: $RELEASE_ID"
          else
            echo "Gitee release for tag '$TAG' not found, creating..."
            # Get commit SHA for the tag
            COMMIT_SHA=$(git rev-parse $TAG)
            echo "Commit SHA: $COMMIT_SHA"
            
            # Create release
            CREATE_RESPONSE=$(curl -s -X POST \
              -H "Authorization: token ${{ secrets.GITEE_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"body\":\"Release $TAG\",\"target_commitish\":\"$COMMIT_SHA\"}" \
              "$GITEE_API/repos/$GITEE_OWNER/$GITEE_REPO/releases")
            
            if echo "$CREATE_RESPONSE" | grep -q '"id"'; then
              RELEASE_ID=$(echo "$CREATE_RESPONSE" | grep -o '"id":[0-9]*' | head -1 | cut -d':' -f2)
              echo "✓ Created Gitee release with ID: $RELEASE_ID"
            else
              echo "✗ Failed to create Gitee release"
              echo "Response: $CREATE_RESPONSE"
              exit 1
            fi
          fi
          
          # Upload each file in dist directory
          for file in dist/*; do
            if [ -f "$file" ]; then
              FILE_NAME=$(basename "$file")
              echo "Uploading $FILE_NAME to Gitee..."
              
              # Check if file already exists
              ASSETS_RESPONSE=$(curl -s "$GITEE_API/repos/$GITEE_OWNER/$GITEE_REPO/releases/$RELEASE_ID/assets?access_token=${{ secrets.GITEE_TOKEN }}")
              
              if echo "$ASSETS_RESPONSE" | grep -q "\"name\":\"$FILE_NAME\""; then
                echo "File $FILE_NAME already exists, skipping..."
              else
                # Upload file
                UPLOAD_RESPONSE=$(curl -s -X POST \
                  -H "Authorization: token ${{ secrets.GITEE_TOKEN }}" \
                  -F "file=@$file" \
                  "$GITEE_API/repos/$GITEE_OWNER/$GITEE_REPO/releases/$RELEASE_ID/assets")
                
                if echo "$UPLOAD_RESPONSE" | grep -q '"id"'; then
                  echo "✓ Successfully uploaded $FILE_NAME to Gitee"
                else
                  echo "✗ Failed to upload $FILE_NAME"
                  echo "Response: $UPLOAD_RESPONSE"
                fi
              fi
            fi
          done
