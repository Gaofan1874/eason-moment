<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eason Moment - 下载</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 24px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
            font-weight: bold;
        }

        h1 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1rem;
        }

        .version-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-top: 15px;
        }

        .download-section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .platform-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .platform-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            padding: 25px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .platform-card:hover {
            border-color: #667eea;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
        }

        .platform-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .platform-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .platform-desc {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        .download-btn {
            display: block;
            width: 100%;
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            text-align: center;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .features {
            margin-bottom: 30px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #555;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .feature-icon {
            font-size: 20px;
        }

        .footer {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            padding-top: 30px;
            border-top: 1px solid #e0e0e0;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .note {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #856404;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .platform-cards {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🎤</div>
            <h1>Eason Moment</h1>
            <p class="subtitle">陪你度过漫长岁月</p>
            <div class="version-badge">版本 0.1.7</div>
        </div>

        <div class="download-section">
            <h2 class="section-title">📥 下载应用</h2>
            <div class="platform-cards">
                <div class="platform-card">
                    <div class="platform-icon">🍎</div>
                    <div class="platform-name">macOS</div>
                    <div class="platform-desc">适用于 macOS 10.15 及以上版本</div>
                    <a href="https://gitee.com/lin-gaofan/eason-moment/releases/latest" class="download-btn" target="_blank">
                        下载 .dmg 文件
                    </a>
                </div>
                <div class="platform-card">
                    <div class="platform-icon">🪟</div>
                    <div class="platform-name">Windows</div>
                    <div class="platform-desc">适用于 Windows 10 及以上版本</div>
                    <a href="https://gitee.com/lin-gaofan/eason-moment/releases/latest" class="download-btn" target="_blank">
                        下载 .exe 文件
                    </a>
                </div>
            </div>
            <div class="note">
                <strong>⚠️ 提示：</strong>点击上方按钮将跳转到 Gitee Releases 页面，选择对应的安装包下载。
            </div>
        </div>

        <div class="features">
            <h2 class="section-title">✨ 核心特性</h2>
            <div class="features-grid">
                <div class="feature-item">
                    <span class="feature-icon">🎨</span>
                    <span>沉浸式海报工坊</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">☁️</span>
                    <span>智能托盘歌词</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">🎭</span>
                    <span>六大心情模式</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">🖼️</span>
                    <span>多种海报模板</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">🌈</span>
                    <span>精美滤镜效果</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">📐</span>
                    <span>多比例导出</span>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>
                <a href="https://gitee.com/lin-gaofan/eason-moment" target="_blank">Gitee 仓库</a> |
                <a href="https://github.com/Gaofan1874/eason-moment" target="_blank">GitHub 仓库</a>
            </p>
            <p style="margin-top: 10px;">
                本应用仅作粉丝交流与学习使用，歌词版权归词作者及发行公司所有。
            </p>
        </div>
    </div>
</body>
</html>
